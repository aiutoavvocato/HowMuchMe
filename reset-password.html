<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — HowMuchMe</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <link rel="canonical" href="https://www.howmuchme.com/reset-password">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        hmm: { blue: '#2563EB', purple: '#7C3AED', dark: '#0F172A', light: '#F8FAFC' }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                        'scale-in': 'scaleIn 0.6s ease-out forwards',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(40px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        scaleIn: { '0%': { opacity: '0', transform: 'scale(0.8)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text { background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gradient-bg { background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%); }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .dark .glass { background: rgba(15,23,42,0.7); border: 1px solid rgba(255,255,255,0.1); }
        .particle { position: absolute; border-radius: 50%; background: rgba(37,99,235,0.1); animation: float-particle 20s infinite linear; }
        .dark .particle { background: rgba(124,58,237,0.1); }
        @keyframes float-particle { 0% { transform: translateY(100vh) translateX(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) translateX(100px); opacity: 0; } }
        .hero-gradient { background: radial-gradient(ellipse at top right, rgba(124,58,237,0.15) 0%, transparent 50%), radial-gradient(ellipse at bottom left, rgba(37,99,235,0.15) 0%, transparent 50%); }
        .dark .hero-gradient { background: radial-gradient(ellipse at top right, rgba(124,58,237,0.2) 0%, transparent 50%), radial-gradient(ellipse at bottom left, rgba(37,99,235,0.2) 0%, transparent 50%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 lg:h-20">
                <a href="/" class="flex items-center gap-3 group">
                    <img src="logo.png" alt="HowMuchMe Logo" class="w-10 h-10 rounded-xl shadow-lg group-hover:shadow-xl transition-shadow">
                    <span class="text-xl font-bold gradient-text">HowMuchMe</span>
                </a>

                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                        <svg class="w-5 h-5 hidden dark:block text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <svg class="w-5 h-5 block dark:hidden text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-20 lg:pt-28">
        <section class="relative min-h-[75vh] flex items-center py-12 overflow-hidden hero-gradient">
            <div class="max-w-md mx-auto px-4 sm:px-6 relative z-10 text-center w-full">
                <!-- Icon -->
                <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center animate-scale-in">
                    <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
                    </svg>
                </div>

                <!-- Title -->
                <h1 class="text-3xl sm:text-4xl font-black leading-tight mb-2">
                    <span class="block text-slate-900 dark:text-white">Nuova</span>
                    <span class="block gradient-text mt-1">Password</span>
                </h1>

                <p class="text-sm text-slate-600 dark:text-slate-400 mb-6">
                    Inserisci la nuova password per il tuo account HowMuchMe.
                </p>

                <!-- MODULO DI RESET PASSWORD -->
                <div id="formContainer" class="glass rounded-2xl p-6 shadow-xl border border-slate-200 dark:border-slate-700 text-left">
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-slate-600 dark:text-slate-300 mb-2">NUOVA PASSWORD</label>
                        <input type="password" id="pass1" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white focus:outline-none focus:border-blue-500">
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs font-semibold text-slate-600 dark:text-slate-300 mb-2">CONFERMA NUOVA PASSWORD</label>
                        <input type="password" id="pass2" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white focus:outline-none focus:border-blue-500">
                    </div>

                    <button id="saveBtn" onclick="handleReset()" class="w-full gradient-bg text-white py-3.5 rounded-xl font-bold text-base shadow-lg hover:opacity-90 transition-opacity">
                        SALVA NUOVA PASSWORD
                    </button>

                    <div id="errorAlert" class="hidden mt-4 p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-500 text-xs font-medium"></div>
                </div>

                <!-- MESSAGGIO DI CONFERMA -->
                <div id="successAlert" class="hidden glass rounded-2xl p-8 shadow-xl border border-green-500/30 text-center">
                    <div class="text-5xl mb-4">🎉</div>
                    <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Password Aggiornata!</h3>
                    <p class="text-sm text-slate-600 dark:text-slate-300 mb-6">
                        La tua nuova password è stata salvata con successo.
                    </p>
                    <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/30 text-emerald-600 dark:text-emerald-400 text-xs font-semibold">
                        Ora apri l'App HowMuchMe ed accedi con la nuova password.
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-8 border-t border-slate-800 text-center text-sm">
        <p>© 2026 HowMuchMe. Tutti i diritti riservati.</p>
    </footer>

    <script>
        const SUPABASE_URL = "https://fjneknvnbgvnnleodzfv.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_hS4gaITPiA02Txt06g5WXQ_CGGkSJeF";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleReset() {
            const p1 = document.getElementById('pass1').value.trim();
            const p2 = document.getElementById('pass2').value.trim();
            const errBox = document.getElementById('errorAlert');
            const btn = document.getElementById('saveBtn');

            errBox.classList.add('hidden');

            if (!p1 || p1.length < 8) {
                errBox.innerText = "La password deve contenere almeno 8 caratteri.";
                errBox.classList.remove('hidden');
                return;
            }
            if (p1 !== p2) {
                errBox.innerText = "Le due password non coincidono.";
                errBox.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerText = "Salvataggio in corso...";

            try {
                const { error } = await supabaseClient.auth.updateUser({ password: p1 });
                if (error) throw error;

                document.getElementById('formContainer').classList.add('hidden');
                document.getElementById('successAlert').classList.remove('hidden');
            } catch (err) {
                errBox.innerText = err.message || "Errore durante l'aggiornamento. Il link potrebbe essere scaduto.";
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "SALVA NUOVA PASSWORD";
            }
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
</body>
</html>
